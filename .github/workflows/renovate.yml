name: Renovate

on:
  schedule:
    - cron: '0 2 * * 1'   # chaque lundi à 2h
  workflow_dispatch:        # équivalent du déclenchement manuel

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.11
        with:
          configurationFile: renovate-config/config.js
          token: ${{ secrets.RENOVATE_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
    steps:
      - name: Installer Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scanner tous les repos et créer les issues
        run: |
          # Récupère tous les repos accessibles avec le token
          REPOS=$(gh repo list --json nameWithOwner -q '.[].nameWithOwner' --limit 100)

          for REPO in $REPOS; do
            echo "🔍 Scan de $REPO..."

            # Clone et scan
            gh repo clone "$REPO" repo-scan -- --depth=1
            trivy fs repo-scan \
              --severity CRITICAL,HIGH \
              --exit-code 0 \
              --format table \
              --output trivy-results.txt

            # Crée le label si inexistant
            gh label create "trivy" \
              --repo "$REPO" \
              --description "Rapport de sécurité Trivy" \
              --color "e11d48" \
              || true

            # Crée ou met à jour l'issue si vulnérabilités trouvées
            if grep -q "CRITICAL\|HIGH" trivy-results.txt; then
              BODY=$(cat trivy-results.txt)
              ISSUE=$(gh issue list --repo "$REPO" --label "trivy" --state open --json number -q '.[0].number')

              if [ -z "$ISSUE" ]; then
                gh issue create \
                  --repo "$REPO" \
                  --title "🔒 Rapport de sécurité Trivy" \
                  --body "$BODY" \
                  --label "trivy"
              else
                gh issue edit "$ISSUE" \
                  --repo "$REPO" \
                  --body "$BODY"
              fi
            else
              echo "✅ Aucune vulnérabilité détectée sur $REPO"
            fi

            # Nettoyage avant le repo suivant
            rm -rf repo-scan trivy-results.txt
          done