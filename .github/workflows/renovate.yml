name: Renovate

on:
  schedule:
    - cron: '0 2 * * 1'   # chaque lundi à 2h
  workflow_dispatch:        # équivalent du déclenchement manuel

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.11
        with:
          configurationFile: renovate-config/config.js
          token: ${{ secrets.RENOVATE_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo cible
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Créer le label trivy si inexistant
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          REPO: ${{ matrix.repo }}
        run: |
          gh label create "trivy" \
            --repo "$REPO" \
            --description "Rapport de sécurité Trivy" \
            --color "e11d48" \
            || true   # ← ne fail pas si le label existe déjà

      - name: Créer ou mettre à jour l'issue
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          REPO: ${{ matrix.repo }}
        run: |
          BODY=$(cat trivy-results.txt)
          ISSUE=$(gh issue list --repo "$REPO" --label "trivy" --state open --json number -q '.[0].number')

          if [ -z "$ISSUE" ]; then
            gh issue create \
              --repo "$REPO" \
              --title "🔒 Rapport de sécurité Trivy" \
              --body "$BODY" \
              --label "trivy"
          else
            gh issue edit "$ISSUE" \
              --repo "$REPO" \
              --body "$BODY"
          fi