name: Renovate

on:
  schedule:
    - cron: '0 2 * * *'   # chaque nuit à 2h
  workflow_dispatch:        # équivalent du déclenchement manuel

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.11
        with:
          configurationFile: renovate-config/config.js
          token: ${{ secrets.RENOVATE_TOKEN }}

  trivy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - Plumatachi/bookly
          - Plumatachi/ETNAir
          - Plumatachi/blog-manager
    steps:
      - name: Checkout repo cible
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Afficher dans le Job Summary
        run: |
          echo "## 🔒 Rapport Trivy" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY